name: CI

on:
  push:
    branches: [ main, add_tests ]
  pull_request:
    branches: [ main, add_tests ]

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install uv
        uv sync --extra dev

    - name: Ruff check
      run: uv run ruff check .

    - name: Ruff format check
      run: uv run ruff format --check .

    - name: Mypy
      run: uv run mypy

  test:
    name: Run tests
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install uv
        uv sync --extra test
    - name: Run tests with coverage
      run: uv run pytest --cov-report=xml

    - name: Generate coverage badge
      # Only attempt the badge push on branches we can actually push to.
      # `main` is protected (changes must go through a PR), so a direct push
      # there is always rejected by repository rules and would fail this job
      # for what is purely a cosmetic README badge. External-fork PRs can't
      # push either and are handled by the separate report step below.
      if: |
        (github.event_name == 'push' && github.ref_name != 'main')
        || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      run: |
        # Extract coverage percentage from XML
        COVERAGE=$(python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        root = tree.getroot()
        coverage = float(root.attrib['line-rate']) * 100
        print(f'{coverage:.2f}')
        ")

        # Create shields.io badge URL
        BADGE_URL="https://img.shields.io/badge/coverage-${COVERAGE}%25-brightgreen"

        # Update README.md with new badge URL
        sed -i "s|https://img.shields.io/badge/coverage-[0-9.]*%25-brightgreen|${BADGE_URL}|g" README.md

        # Get the current branch name
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BRANCH_NAME="${{ github.head_ref }}"
        else
          BRANCH_NAME="${{ github.ref_name }}"
        fi

        # Commit if the badge actually changed.
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        if git diff --staged --quiet; then
          echo "Badge already up to date; nothing to push."
          exit 0
        fi
        git commit -m "Update coverage badge to ${COVERAGE}%"

        # Best-effort push. This must not fail the test job: the branch may be
        # protected (race on merge) or already deleted by the time we get here,
        # neither of which has anything to do with whether the tests passed.
        if ! git push origin HEAD:${BRANCH_NAME}; then
          echo "::warning::Could not push coverage badge to ${BRANCH_NAME} (branch protected, deleted, or behind). Skipping; badge is cosmetic."
        fi

    - name: Coverage report (for external PRs)
      # Only run on external PRs where we can't update the badge
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
      run: |
        # Extract coverage percentage from XML
        COVERAGE=$(python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        root = tree.getroot()
        coverage = float(root.attrib['line-rate']) * 100
        print(f'{coverage:.2f}')
        ")
        
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "Current coverage: **${COVERAGE}%**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Note: Coverage badge cannot be updated automatically for external pull requests due to security restrictions." >> $GITHUB_STEP_SUMMARY
        echo "The badge will be updated when this PR is merged by a maintainer." >> $GITHUB_STEP_SUMMARY
        
        # Output coverage to logs for visibility
        echo "Coverage: ${COVERAGE}%" 